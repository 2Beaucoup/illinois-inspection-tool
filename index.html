    if (check.tip) html += '<span class="tip">' + esc(check.tip) + '</span>';
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function toggleCheck(el, compId, checkKey) {
  el.classList.toggle('checked');
  var state = getComponentState(compId);
  state.checks[checkKey] = el.classList.contains('checked');
  saveState();
  updateTopBarProgress();
}

/* ============================================
   RENDER: Ref Table
   ============================================ */
function renderRefTable(rt) {
  var html = '<div class="ref-table">';
  html += '<div class="ref-table-title">' + esc(rt.title || 'Reference') + '</div>';
  html += '<table>';

  // If it has columns/rows (array-of-arrays format)
  if (rt.columns && rt.rows) {
    html += '<tr>';
    rt.columns.forEach(function(col) { html += '<th>' + esc(col) + '</th>'; });
    html += '</tr>';
    rt.rows.forEach(function(row) {
      html += '<tr>';
      if (Array.isArray(row)) {
        row.forEach(function(cell) { html += '<td>' + esc(String(cell)) + '</td>'; });
      } else if (row.key !== undefined) {
        html += '<td>' + esc(String(row.key)) + '</td><td>' + esc(String(row.value)) + '</td>';
      }
      html += '</tr>';
    });
  }
  // If rows is array of {key, value}
  else if (rt.rows && rt.rows.length && rt.rows[0].key !== undefined) {
    rt.rows.forEach(function(row) {
      html += '<tr><td><strong>' + esc(String(row.key)) + '</strong></td><td>' + esc(String(row.value)) + '</td></tr>';
    });
  }

  html += '</table></div>';
  return html;
}

/* ============================================
   RENDER: ICA Fields
   ============================================ */
function renderIcaFields(compId, icaFields, state) {
  var html = '';
  icaFields.forEach(function(field) {
    // ICA field with checks (mini-component pattern from exterior data)
    if (field.checks && field.checks.length) {
      html += '<div class="ica-field" style="padding:0;border:none;background:none">';
      html += '<div class="section-label">' + esc(field.label) + '</div>';
      html += renderChecks(compId, field.checks, state, 'ica-' + field.id);
      if (field.rating) {
        html += renderRating(compId, field.rating, state, 'ica-' + field.id);
      }
      if (field.findings && field.findings.length) {
        html += renderFindings(compId, field.findings, state, 'ica-' + field.id);
      }
      html += '</div>';
    }
    // Toggle-style ICA field
    else if (field.type === 'toggle' && field.options) {
      var currentVal = (state.icaFields && state.icaFields[field.id]) || '';
      html += '<div class="field-row">';
      html += '<div class="f-label">' + esc(field.label);
      if (field.tip) html += '<span class="f-tip">' + esc(field.tip) + '</span>';
      html += '</div>';
      html += '<div class="toggle-row">';
      field.options.forEach(function(opt) {
        var cls = getToggleClass(opt, currentVal === opt);
        html += '<button class="toggle-btn' + cls + '" onclick="setIcaField(\'' + compId + '\',\'' + field.id + '\',\'' + esc(opt) + '\',this)">' + esc(opt) + '</button>';
      });
      html += '</div></div>';
    }
    // Simple label + options (inline field row)
    else if (field.options) {
      var currentVal = (state.icaFields && state.icaFields[field.id]) || '';
      html += '<div class="field-row">';
      html += '<div class="f-label">' + esc(field.label);
      if (field.tip) html += '<span class="f-tip">' + esc(field.tip) + '</span>';
      html += '</div>';
      html += '<div class="toggle-row">';
      field.options.forEach(function(opt) {
        var cls = getToggleClass(opt, currentVal === opt);
        html += '<button class="toggle-btn' + cls + '" onclick="setIcaField(\'' + compId + '\',\'' + field.id + '\',\'' + esc(opt) + '\',this)">' + esc(opt) + '</button>';
      });
      html += '</div></div>';
    }
  });
  return html;
}

function getToggleClass(optLabel, isActive) {
  if (!isActive) return '';
  var lower = optLabel.toLowerCase();
  if (lower === 'ok' || lower === 'yes' || lower === 'present' || lower === 'clean' || lower === 'normal' || lower === 'quiet' || lower === 'none' || lower === 'clear' || lower === 'intact') return ' active-yes';
  if (lower === 'no' || lower === 'needs repair' || lower === 'issue' || lower === 'poor' || lower === 'clogged' || lower === 'detected!' || lower === 'detected' || lower === 'missing' || lower === 'noisy' || lower === 'low' || lower === 'abnormal') return ' active-no';
  if (lower === 'n/v' || lower === 'n/a') return ' active-na';
  return ' active-neutral';
}

function setIcaField(compId, fieldId, value, el) {
  var state = getComponentState(compId);
  state.icaFields[fieldId] = value;
  saveState();
  // Toggle siblings
  if (el) {
    el.parentElement.querySelectorAll('.toggle-btn').forEach(function(b) {
      b.classList.remove('active-yes','active-no','active-na','active-neutral');
    });
    el.classList.add(getToggleClass(value, true).trim());
  }
  updateComponentSummary(compId);
}

/* ============================================
   RENDER: Rating
   ============================================ */
function renderRating(compId, ratingDef, state, prefix) {
  var ratingKey = prefix || 'main';
  var currentRating = state.rating;
  var html = '<div class="section-label accent">Rate Condition</div>';
  html += '<div class="rating-row">';

  var levels = [
    { key: 'acceptable', label: 'Acceptable', desc: ratingDef ? ratingDef.acceptable : 'Functional, safe' },
    { key: 'fair', label: 'Fair', desc: ratingDef ? ratingDef.fair : 'Aging, minor issues' },
    { key: 'poor', label: 'Poor', desc: ratingDef ? ratingDef.poor : 'Safety concern / failed' }
  ];

  levels.forEach(function(level) {
    var activeClass = (currentRating === level.label) ? ' active' : '';
    html += '<button class="rating-btn ' + level.key + activeClass + '" onclick="selectRating(this,\'' + compId + '\',\'' + level.label + '\')">';
    html += '<span class="r-label">' + level.label + '</span>';
    if (level.desc) html += '<span class="r-desc">' + esc(truncate(level.desc, 60)) + '</span>';
    html += '</button>';
  });

  html += '</div>';
  return html;
}

function selectRating(el, compId, rating) {
  // Deactivate siblings
  el.parentElement.querySelectorAll('.rating-btn').forEach(function(b) { b.classList.remove('active'); });
  el.classList.add('active');

  var state = getComponentState(compId);
  state.rating = rating;

  updateComponentSummary(compId);

}

/* ============================================
   RENDER: Findings
   ============================================ */
function renderFindings(compId, findings, state, prefix) {
  var html = '';

  // Finding chips
  html += '<div class="chip-group">';
  findings.forEach(function(f) {
    html += '<button class="chip sm" onclick="showFinding(this,\'' + compId + '-' + (prefix||'f') + '-' + f.id + '\')">' + esc(f.chipLabel || f.id) + '</button>';
  });
  html += '</div>';

  // Finding panels
  findings.forEach(function(f) {
    var panelId = compId + '-' + (prefix||'f') + '-' + f.id;
    html += '<div id="finding-' + panelId + '" class="hidden cond">';
    html += '<div class="cond-panel">';
    html += '<div class="cp-header">' + esc(f.chipLabel || f.id) + '</div>';
    html += '<div class="cp-body">';

    // Context (does this apply?)
    if (f.context) {
      html += '<div class="finding-context">';
      html += '<div class="ctx-label">' + esc(f.context.question || 'Does this apply?') + '</div>';
      html += '<div class="ctx-grid">';
      if (f.context.yes) f.context.yes.forEach(function(y) { html += '<div class="ctx-yes">' + esc(y) + '</div>'; });
      if (f.context.no) f.context.no.forEach(function(n) { html += '<div class="ctx-no">' + esc(n) + '</div>'; });
      html += '</div></div>';
    }

    // Expect (what does good look like?)
    if (f.expect) {
      html += '<div class="finding-expect">';
      html += '<div class="ctx-label">What does GOOD look like?</div>';
      html += '<div class="expect-list">';
      f.expect.forEach(function(e) { html += '<div>&#10003; ' + esc(e) + '</div>'; });
      html += '</div></div>';
    }

    // Conditions (what are you seeing? - chip-based decision tree)
    if (f.conditions && f.conditions.length) {
      html += '<div class="ctx-label">What are you seeing?</div>';
      html += '<div class="chip-group">';
      f.conditions.forEach(function(cond) {
        html += '<button class="chip sm" onclick="showConditionResult(this,\'' + panelId + '-' + cond.id + '\')">' + esc(cond.label) + '</button>';
      });
      html += '</div>';

      // Condition result panels
      f.conditions.forEach(function(cond) {
        html += '<div id="cond-' + panelId + '-' + cond.id + '" class="hidden cond">';
        // Guidance block
        if (cond.severity) {
          var guidanceClass = cond.severity === 'good' ? 'good-guidance' : cond.severity === 'warn' ? 'warn-guidance' : 'danger-guidance';
          html += '<div class="finding-guidance ' + guidanceClass + '">';
          if (cond.title) html += '<div class="g-title">' + esc(cond.title) + '</div>';
          if (cond.note) html += '<div class="g-note">' + esc(cond.note) + '</div>';
          html += '</div>';
        }
        // Can't say
        if (cond.cantSay) {
          html += '<div class="cant-say"><div class="cant-title">&#10060; Do NOT say</div><div>' + esc(cond.cantSay) + '</div></div>';
        }
        // Report blocks
        if (cond.report) {
          if (cond.report.define) html += renderReportBlock('define', cond.report.define);
          if (cond.report.direct) html += renderReportBlock('direct', cond.report.direct);
          if (cond.report.defer) html += renderReportBlock('defer', cond.report.defer);
        }
        html += '</div>';
      });
    }

    // Simple findings (define/direct/defer at finding level)
    if (f.define || f.direct || f.defer) {
      if (f.define) html += renderReportBlock('define', f.define);
      if (f.direct) html += renderReportBlock('direct', f.direct);
      if (f.defer) html += renderReportBlock('defer', f.defer);
    }

    html += '</div></div></div>'; // close cp-body, cond-panel, finding panel
  });

  return html;
}

function renderReportBlock(type, text) {
  var labelMap = { define: 'Define', direct: 'Direct', defer: 'Defer' };
  return '<div class="report-block ' + type + '">' +
    '<span class="label">' + labelMap[type] + '</span>' +
    '<span class="text">' + esc(text) + '</span>' +
    '<button class="copy-btn" onclick="copyText(this)">Copy</button>' +
    '</div>';
}

function showFinding(el, panelId) {
  el.classList.toggle('active');
  var panel = document.getElementById('finding-' + panelId);
  if (panel) panel.classList.toggle('hidden');

function showConditionResult(el, condId) {
  // Deactivate sibling chips
  el.parentElement.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
  el.classList.add('active');

  // Hide sibling condition results, show selected
  // Find the parent panel and hide all cond results within it
  var parent = el.closest('.cp-body');
  if (parent) {
    parent.querySelectorAll('[id^="cond-"]').forEach(function(p) { p.classList.add('hidden'); });
  }
  var target = document.getElementById('cond-' + condId);
  if (target) target.classList.remove('hidden');
}

   ============================================ */
function toggleField(el, cls) {
  el.parentElement.querySelectorAll('.toggle-btn').forEach(function(b) {
    b.classList.remove('active-yes','active-no','active-na','active-neutral');
  });
  el.classList.add(cls);
}

function copyText(btnEl) {
  var text = btnEl.parentElement.querySelector('.text').textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      btnEl.textContent = 'Copied!';
      btnEl.classList.add('copied');
      setTimeout(function() { btnEl.textContent = 'Copy'; btnEl.classList.remove('copied'); }, 1500);
    }).catch(function() {
      fallbackCopy(text, btnEl);
    });
  } else {
    fallbackCopy(text, btnEl);
  }
}

function fallbackCopy(text, btnEl) {
  var textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    btnEl.textContent = 'Copied!';
    btnEl.classList.add('copied');
    setTimeout(function() { btnEl.textContent = 'Copy'; btnEl.classList.remove('copied'); }, 1500);
  } catch(e) {
    btnEl.textContent = 'Failed';
    setTimeout(function() { btnEl.textContent = 'Copy'; }, 1500);
  }
  document.body.removeChild(textarea);
}

function showResult(prefix, result) {
  document.querySelectorAll('[id^="' + prefix + '"]').forEach(function(el) {
    el.classList.add('hidden');
  });
  var target = document.getElementById(prefix + result);
  if (target) target.classList.remove('hidden');
}

function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function truncate(str, len) {
  if (!str) return '';
  if (str.length <= len) return str;
  return str.substring(0, len) + '...';
}

  "ext-service-entry":["elec-main","ext-receptacles"],
  "ext-receptacles":["elec-gfci","ext-service-entry","garage-service"],
  "garage-type":["garage-floor","garage-overhead","garage-service"],
  "garage-floor":["garage-type","basement-foundation","basement-moisture"],
  "garage-overhead":["garage-type","garage-service"],
  "garage-service":["elec-gfci","ext-receptacles","elec-branch","garage-type"],
  "int-kitchen":["plumb-supply","plumb-dwv","elec-gfci","elec-branch"],
  "int-bathroom":["plumb-supply","plumb-dwv","elec-gfci","roof-vents"],
  "int-laundry":["plumb-supply","plumb-dwv","elec-gfci","elec-branch"],
  "int-rooms":["int-stairs","ext-windows","elec-branch"],
  "int-fireplace":["roof-chimney","plumb-gas","heat-system"],
  "int-stairs":["grounds-steps","grounds-deck","int-rooms"],
  "int-smoke-co":["elec-smoke-co","int-fireplace","heat-system","plumb-gas"],
  "basement-structure":["basement-foundation","attic-structure","grounds-deck"],
  "basement-moisture":["basement-foundation","grounds-grading","plumb-supply","ext-gutters"],
  "elec-smoke-co":["int-smoke-co","elec-branch","heat-system","plumb-gas"],
  "elec-afci":["elec-main","elec-branch","elec-gfci"],
  "plumb-water-softener":["plumb-supply","plumb-water-heater"]
};

function buildSearchIndex() {
  searchIndex = [];
  INSPECTION_DATA.sections.forEach(function(section) {
    if (!section.components) return;
    var si = section.id, sn = section.name || section.title || section.id, sx = section.icon || '';
    section.components.forEach(function(comp) {
      var ci = comp.id, ct = comp.title || comp.id, cx = comp.icon || '';

      // Component title
      addIdx(ct, si, sn, sx, ci, ct, cx, 'component', ct);

      // DataCapture labels
      if (comp.dataCapture) comp.dataCapture.forEach(function(f) {
        addIdx(f.label, si, sn, sx, ci, ct, cx, 'field', f.label);
      });

      // Type options + their checks/findings
      if (comp.typeSelect) {
        comp.typeSelect.options.forEach(function(opt) {
          var optText = opt.label;
          if (opt.checks) opt.checks.forEach(function(c) { optText += ' ' + (c.label || c.text || ''); });
          addIdx(optText, si, sn, sx, ci, ct, cx, 'type', opt.label);
          if (opt.findings) opt.findings.forEach(function(f) {
            addIdx((f.chipLabel || f.label || f.id) + ' ' + gft(f), si, sn, sx, ci, ct, cx, 'finding', f.chipLabel || f.label || f.id);
          });
        });
        if (comp.typeSelect.idHelper) comp.typeSelect.idHelper.forEach(function(h) {
          addIdx(h.name + ' ' + h.clues, si, sn, sx, ci, ct, cx, 'id-helper', h.name);
        });
      }

      // Universal checks
      if (comp.universalChecks) comp.universalChecks.forEach(function(c) {
        addIdx((c.label || c.text || '') + ' ' + (c.tip || ''), si, sn, sx, ci, ct, cx, 'check', c.label || c.text || '');
      });

      // Component-level findings
      if (comp.findings) comp.findings.forEach(function(f) {
        addIdx((f.chipLabel || f.label || f.id) + ' ' + gft(f), si, sn, sx, ci, ct, cx, 'finding', f.chipLabel || f.label || f.id);
      });

      // Ref tables
      if (comp.refTables) comp.refTables.forEach(function(rt) {
        var txt = rt.title || '';
        if (rt.rows) rt.rows.forEach(function(row) {
          if (Array.isArray(row)) txt += ' ' + row.join(' ');
          else if (row.key) txt += ' ' + row.key + ' ' + row.value;
        });
        addIdx(txt, si, sn, sx, ci, ct, cx, 'reference', rt.title);
      });

      // ICA fields
      if (comp.icaFields && Array.isArray(comp.icaFields)) comp.icaFields.forEach(function(f) {
        addIdx(f.label + ' ' + (f.tip || ''), si, sn, sx, ci, ct, cx, 'ica', f.label);
      });

      // Red flags
      if (comp.redFlags) comp.redFlags.forEach(function(rf) {
        var t = typeof rf === 'string' ? rf : (rf.text || rf.title || '');
        addIdx(t, si, sn, sx, ci, ct, cx, 'red-flag', t);
      });

      // Study content
      if (comp.study) {
        var st = (comp.study.whatItIs || '') + ' ' + (comp.study.howToInspect || '') + ' ' + (comp.study.ashiSop || '');
        if (comp.study.details) st += ' ' + comp.study.details.join(' ');
        if (st.trim()) addIdx(st, si, sn, sx, ci, ct, cx, 'study', 'Study: ' + ct);
      }

      // Legacy field data
      if (comp.field) {
        var ft = (comp.field.howToIdentify || '') + ' ';
        if (comp.field.reasoning) ft += comp.field.reasoning.join(' ');
        if (comp.field.checklist) ft += ' ' + comp.field.checklist.join(' ');
        if (ft.trim()) addIdx(ft, si, sn, sx, ci, ct, cx, 'reference', ct);
      }
    });
  });
}

function gft(f) {
  var t = '';
  if (f.context) {
    if (f.context.yes) t += f.context.yes.join(' ') + ' ';
    if (f.context.no) t += f.context.no.join(' ') + ' ';
  }
  if (f.expect) t += f.expect.join(' ') + ' ';
  if (f.conditions) f.conditions.forEach(function(c) { t += (c.label||'') + ' ' + (c.title||'') + ' ' + (c.note||'') + ' '; });
  return t;
}

function addIdx(text, secId, secName, secIcon, compId, compTitle, compIcon, type, label) {
  if (!text || !text.trim()) return;
  searchIndex.push({ t:text.toLowerCase(), si:secId, sn:secName, sx:secIcon, ci:compId, ct:compTitle, cx:compIcon, tp:type, lb:label||'' });
}

function handleSearch(query) {
  clearTimeout(searchTimeout);
  var clearBtn = document.getElementById('search-clear');
  if (query.trim().length > 0) {
    clearBtn.style.display = 'block';
    searchTimeout = setTimeout(function() { showSearchResults(query.trim()); }, 150);
  } else {
    clearBtn.style.display = 'none';
    exitSearch();
  }
}

function showSearchResults(query) {
  var terms = query.toLowerCase().split(/\s+/);
  var seen = {};
  var results = [];

  searchIndex.forEach(function(e) {
    for (var i = 0; i < terms.length; i++) {
      if (e.t.indexOf(terms[i]) === -1) return;
    }
    var key = e.si + '|' + e.ci;
    if (!seen[key]) {
      seen[key] = { si:e.si, sn:e.sn, sx:e.sx, ci:e.ci, ct:e.ct, cx:e.cx, matches:[] };
      results.push(seen[key]);
    }
    if (seen[key].matches.length < 5) seen[key].matches.push({ tp:e.tp, lb:e.lb });
  });

  var container = document.getElementById('search-results');
  document.getElementById('component-list').style.display = 'none';
  document.getElementById('component-detail').style.display = 'none';
  container.style.display = 'block';

  if (results.length === 0) {
    container.innerHTML = '<div class="sr-empty">No results for "' + esc(query) + '"</div>';
    return;
  }

  // Group by section
  var groups = {};
  var order = [];
  results.forEach(function(r) {
    if (!groups[r.si]) { groups[r.si] = { name:r.sn, icon:r.sx, items:[] }; order.push(r.si); }
    groups[r.si].items.push(r);
  });

  var html = '<div style="font-size:0.72rem;color:var(--muted);margin-bottom:8px;padding:0 2px">' + results.length + ' result' + (results.length !== 1 ? 's' : '') + ' for "' + esc(query) + '"</div>';

  order.forEach(function(sid) {
    var g = groups[sid];
    html += '<div class="sr-group">';
    html += '<div class="sr-group-header">' + g.icon + ' ' + esc(g.name) + '</div>';
    g.items.forEach(function(item) {
      var snippets = [];
      var seenTypes = {};
      item.matches.forEach(function(m) {
        if (!seenTypes[m.tp] && snippets.length < 3) { snippets.push(m.lb); seenTypes[m.tp] = true; }
      });
      html += '<div class="sr-item" onclick="navigateToComponent(\'' + item.si + '\',\'' + item.ci + '\')">';
      html += '<div class="sr-icon">' + (item.cx || '') + '</div>';
      html += '<div class="sr-body">';
      html += '<div class="sr-title">' + esc(item.ct) + '</div>';
      html += '<div class="sr-path">' + g.icon + ' ' + esc(g.name) + '</div>';
      if (snippets.length) html += '<div class="sr-snippet">' + snippets.map(function(s) { return hlMatch(s, query); }).join(' &middot; ') + '</div>';
      html += '</div></div>';
    });
    html += '</div>';
  });

  container.innerHTML = html;
}

function hlMatch(text, query) {
  if (!text) return '';
  if (text.length > 80) text = text.substring(0, 80) + '...';
  var out = esc(text);
  query.toLowerCase().split(/\s+/).forEach(function(term) {
    var safe = esc(term).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp('(' + safe + ')', 'gi'), '<mark>$1</mark>');
  });
  return out;
}

function navigateToComponent(sectionId, componentId) {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-results').innerHTML = '';
  selectSection(sectionId);
  selectComponent(componentId);
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  exitSearch();
}

function exitSearch() {
  var sr = document.getElementById('search-results');
  sr.style.display = 'none';
  sr.innerHTML = '';
  if (currentSectionId) {
    document.getElementById('component-list').style.display = '';
    if (currentComponentId) {
      document.getElementById('component-list').style.display = 'none';
      document.getElementById('component-detail').style.display = 'block';
    }
  }
}

function getRelatedComponents(compId) {
  var refs = CROSS_REFS[compId] || [];
  var results = [];
  refs.forEach(function(relId) {
    for (var i = 0; i < INSPECTION_DATA.sections.length; i++) {
      var sec = INSPECTION_DATA.sections[i];
      if (!sec.components) continue;
      for (var j = 0; j < sec.components.length; j++) {
        if (sec.components[j].id === relId) {
          results.push({ si:sec.id, sn:sec.name||sec.title||sec.id, sx:sec.icon||'', comp:sec.components[j] });
          break;
        }
      }
    }
  });
  return results;
}

function renderRelatedItems(compId) {
  var related = getRelatedComponents(compId);
  if (related.length === 0) return '';
  var html = '<div class="related-section">';
  html += '<div class="section-label accent">See Also</div>';
  html += '<div class="related-grid">';
  related.forEach(function(r) {
    html += '<button class="related-btn" onclick="navigateToComponent(\'' + r.si + '\',\'' + r.comp.id + '\')">';
    html += '<span class="rb-icon">' + (r.comp.icon || '') + '</span>';
    html += '<span class="rb-name">' + esc(r.comp.title || r.comp.id) + '</span>';
    html += '<span class="rb-section">' + r.sx + ' ' + esc(r.sn) + '</span>';
    html += '</button>';
  });
  html += '</div></div>';
  return html;
}

/* ============================================
   INITIALIZATION
   ============================================ */
function init() {
  // Set date
  var now = new Date();
  var dateStr = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  document.getElementById('top-bar-date').textContent = dateStr;

  // Load saved state
  loadState();

  // Build navigation
  buildSectionNav();

  // Build search index
  buildSearchIndex();

  // Select first section
  if (INSPECTION_DATA.sections.length > 0) {
    selectSection(INSPECTION_DATA.sections[0].id);
  }

  // Update progress
  updateTopBarProgress();
}

init();
</script>
