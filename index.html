<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Illinois Home Inspection Walkthrough</title>
<style>
/* ============================================
   ROOT VARIABLES — from prototype 04
   ============================================ */
:root {
  --bg: #f4efe6;
  --panel: rgba(255,251,245,0.95);
  --ink: #1f1c18;
  --muted: #656055;
  --line: rgba(84,68,43,0.14);
  --accent: #b85a2f;
  --accent-strong: #94461f;
  --accent-soft: rgba(184,90,47,0.12);
  --good: #2e6a44;
  --good-bg: rgba(46,106,68,0.08);
  --warn: #8a6b17;
  --warn-bg: rgba(138,107,23,0.08);
  --danger: #a63a2a;
  --danger-bg: rgba(166,58,42,0.08);
  --define: #2b5c8a;
  --define-bg: rgba(43,92,138,0.08);
  --direct: #8a6b17;
  --direct-bg: rgba(138,107,23,0.08);
  --defer: #2e6a44;
  --defer-bg: rgba(46,106,68,0.08);
  --font-ui: "Avenir Next","Gill Sans","Trebuchet MS",system-ui,sans-serif;
  --font-display: "Palatino","Book Antiqua",Georgia,serif;
  --radius-lg: 16px;--radius-md: 10px;--radius-sm: 6px;
  --shadow-sm: 0 2px 8px rgba(57,43,25,0.08);
  --top-bar-h: 56px;
  --nav-h: 48px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:var(--font-ui);color:var(--ink);background:var(--bg);padding:0;max-width:500px;margin:0 auto;padding-bottom:40px}

/* ============================================
   TOP BAR — Property info, fixed at top
   ============================================ */
#top-bar{
  position:sticky;top:0;z-index:100;
  background:var(--panel);border-bottom:1px solid var(--line);
  padding:8px 14px;display:flex;align-items:center;gap:10px;
  min-height:var(--top-bar-h);box-shadow:0 1px 6px rgba(57,43,25,0.06);
}
#top-bar .tb-icon{font-size:1.2rem;flex-shrink:0}
#top-bar .tb-fields{flex:1;display:flex;flex-direction:column;gap:2px}
#top-bar .tb-address{font-family:var(--font-ui);font-size:0.82rem;font-weight:600;border:none;background:transparent;color:var(--ink);padding:2px 0;outline:none;width:100%}
#top-bar .tb-address::placeholder{color:var(--muted);font-weight:400}
#top-bar .tb-date{font-size:0.68rem;color:var(--muted);font-weight:600}
#top-bar .tb-progress{font-size:0.66rem;font-weight:700;color:var(--accent-strong);background:var(--accent-soft);padding:4px 8px;border-radius:99px;white-space:nowrap;flex-shrink:0}

/* ============================================
   SECTION NAV — Horizontal scroll pill bar
   ============================================ */
#section-nav{
  position:sticky;top:var(--top-bar-h);z-index:99;
  background:var(--bg);border-bottom:1px solid var(--line);
  padding:6px 10px;display:flex;gap:6px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;min-height:var(--nav-h);align-items:center;
}
#section-nav::-webkit-scrollbar{display:none}
.section-pill{
  padding:6px 12px;border-radius:999px;border:1.5px solid var(--line);
  background:#fff;cursor:pointer;font-family:var(--font-ui);font-size:0.72rem;
  font-weight:600;color:var(--muted);transition:all .15s;
  white-space:nowrap;flex-shrink:0;min-height:36px;
  display:inline-flex;align-items:center;gap:4px;
}
.section-pill:hover{border-color:rgba(184,90,47,0.3);background:var(--accent-soft)}
.section-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.section-pill .sp-progress{font-size:0.6rem;opacity:0.7;margin-left:2px}

/* ============================================
   COMPONENT LIST — Grid of component buttons
   ============================================ */
#component-list{padding:12px;display:grid;gap:10px}
#component-list .cl-header{display:grid;gap:4px;margin-bottom:4px}
#component-list .cl-title{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--ink)}
#component-list .cl-desc{font-size:0.78rem;color:var(--muted);line-height:1.4}
#component-list .cl-ica{font-size:0.7rem;color:var(--accent-strong);background:var(--accent-soft);padding:6px 10px;border-radius:var(--radius-sm);line-height:1.3}
#component-list .cl-cya{background:var(--warn-bg);padding:8px 10px;border-radius:var(--radius-sm);font-size:0.72rem;color:var(--warn);line-height:1.4}
#component-list .cl-cya strong{display:block;font-size:0.66rem;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px}

.component-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.component-card-btn{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-md);
  padding:14px 12px;cursor:pointer;font-family:var(--font-ui);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:all .15s;min-height:80px;justify-content:center;
  text-align:center;box-shadow:var(--shadow-sm);
}
.component-card-btn:hover{border-color:rgba(184,90,47,0.3);background:var(--accent-soft)}
.component-card-btn .ccb-icon{font-size:1.4rem}
.component-card-btn .ccb-name{font-size:0.78rem;font-weight:600;line-height:1.2}
.component-card-btn .ccb-progress{font-size:0.62rem;color:var(--muted);margin-top:2px}
.component-card-btn .ccb-progress.done{color:var(--good);font-weight:700}
.component-card-btn .ccb-rating{font-size:0.6rem;font-weight:700;padding:2px 6px;border-radius:99px;margin-top:2px}
.component-card-btn .ccb-rating.acceptable{background:var(--good-bg);color:var(--good)}
.component-card-btn .ccb-rating.fair{background:var(--warn-bg);color:var(--warn)}
.component-card-btn .ccb-rating.poor{background:var(--danger-bg);color:var(--danger)}

/* ============================================
   COMPONENT DETAIL — Back button + card
   ============================================ */
#component-detail{padding:12px;display:none}
.back-btn{
  display:inline-flex;align-items:center;gap:4px;font-family:var(--font-ui);
  font-size:0.78rem;font-weight:600;color:var(--accent-strong);cursor:pointer;
  background:none;border:none;padding:6px 0;margin-bottom:8px;
  min-height:44px;
}
.back-btn:hover{color:var(--accent)}

/* ============================================
   CARD — from prototype 04
   ============================================ */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);margin-bottom:16px}
.card-header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
.card-header .icon{font-size:1.4rem}
.card-header h2{font-family:var(--font-display);font-size:1.1rem;flex:1}
.card-header .badge{font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:99px;background:var(--accent-soft);color:var(--accent-strong);text-transform:uppercase;letter-spacing:0.06em}
.card-body{padding:16px;display:grid;gap:16px}

/* SECTION LABELS */
.section-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);padding-bottom:4px;border-bottom:1px solid var(--line)}
.section-label.accent{color:var(--accent-strong);border-color:var(--accent)}

/* CHIPS */
.chip-group{display:flex;flex-wrap:wrap;gap:8px}
.chip-group-label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent-strong);width:100%;margin-bottom:2px}
.chip{padding:10px 14px;border-radius:999px;border:1.5px solid var(--line);background:#fff;cursor:pointer;font-family:var(--font-ui);font-size:0.82rem;color:var(--ink);transition:all .15s;min-height:44px;display:inline-flex;align-items:center;gap:6px}
.chip:hover{border-color:rgba(184,90,47,0.3);background:var(--accent-soft)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.sm{padding:8px 12px;min-height:38px;font-size:0.78rem}
.chip.danger{border-color:rgba(166,58,42,0.3)}
.chip.danger.active{background:var(--danger);border-color:var(--danger);color:#fff}
.chip.good{border-color:rgba(46,106,68,0.3)}
.chip.good.active{background:var(--good);border-color:var(--good);color:#fff}

/* FILL-IN */
.fill-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fill-item{display:flex;flex-direction:column;gap:3px}
.fill-item.wide{grid-column:1/-1}
.fill-wide{grid-column:1/-1}
.fill-item label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted)}
.fill-item input,.fill-item select,.fill-item textarea{padding:10px;border:1.5px solid var(--line);border-radius:var(--radius-sm);font-family:var(--font-ui);font-size:0.86rem;background:#fff;color:var(--ink);min-height:42px}
.fill-item textarea{min-height:64px;resize:vertical}
.fill-item input:focus,.fill-item select:focus,.fill-item textarea:focus{outline:none;border-color:var(--accent)}

/* CONDITIONAL PANEL */
.cond{animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.cond-panel{border:1px solid var(--line);border-radius:var(--radius-md);overflow:hidden}
.cond-panel .cp-header{padding:10px 14px;background:var(--accent-soft);font-size:0.78rem;font-weight:700;color:var(--accent-strong);text-transform:uppercase;letter-spacing:0.06em;display:flex;align-items:center;gap:6px}
.cond-panel .cp-body{padding:12px 14px;display:grid;gap:10px}

/* CHECKLIST */
.check-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.check-item:last-child{border-bottom:none}
.check-box{width:24px;height:24px;border-radius:var(--radius-sm);border:2px solid var(--line);background:#fff;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;transition:all .15s;margin-top:1px;min-width:24px;min-height:24px}
.check-box.checked{background:var(--good);border-color:var(--good);color:#fff}
.check-box.flagged{background:var(--danger);border-color:var(--danger);color:#fff}
.check-label{font-size:0.86rem;line-height:1.4;flex:1}
.check-label .tip{display:block;font-size:0.74rem;color:var(--muted);margin-top:2px;line-height:1.3}

/* REF TABLE */
.ref-table{border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden}
.ref-table-title{padding:8px 12px;background:var(--accent-soft);font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent-strong);display:flex;align-items:center;gap:6px}
.ref-table table{width:100%;border-collapse:collapse}
.ref-table th{text-align:left;padding:6px 10px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);background:rgba(0,0,0,0.02);border-bottom:1px solid var(--line)}
.ref-table td{padding:7px 10px;font-size:0.82rem;border-bottom:1px solid rgba(0,0,0,0.04)}
.ref-table tr:last-child td{border-bottom:none}
.ref-table tr.highlight{background:var(--warn-bg)}
.ref-table .mono{font-family:'Courier New',monospace;font-weight:600}
.ref-table .danger-text{color:var(--danger);font-weight:600}
.ref-table .good-text{color:var(--good);font-weight:600}

/* RATING */
.rating-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.rating-btn{padding:10px 8px;border-radius:var(--radius-sm);border:1.5px solid var(--line);background:#fff;cursor:pointer;font-family:var(--font-ui);font-size:0.78rem;text-align:center;transition:all .15s;min-height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.rating-btn .r-label{font-size:0.66rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em}
.rating-btn .r-desc{font-size:0.7rem;color:var(--muted);line-height:1.2}
.rating-btn.acceptable .r-label{color:var(--good)}
.rating-btn.fair .r-label{color:var(--warn)}
.rating-btn.poor .r-label{color:var(--danger)}
.rating-btn.acceptable:hover{border-color:var(--good);background:var(--good-bg)}
.rating-btn.fair:hover{border-color:var(--warn);background:var(--warn-bg)}
.rating-btn.poor:hover{border-color:var(--danger);background:var(--danger-bg)}
.rating-btn.acceptable.active{background:var(--good);border-color:var(--good);color:#fff}
.rating-btn.acceptable.active .r-label,.rating-btn.acceptable.active .r-desc{color:#fff}
.rating-btn.fair.active{background:var(--warn);border-color:var(--warn);color:#fff}
.rating-btn.fair.active .r-label,.rating-btn.fair.active .r-desc{color:#fff}
.rating-btn.poor.active{background:var(--danger);border-color:var(--danger);color:#fff}
.rating-btn.poor.active .r-label,.rating-btn.poor.active .r-desc{color:#fff}

/* REPORT BLOCKS */
.report-block{border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;display:flex;align-items:flex-start;gap:8px}
.report-block:last-child{margin-bottom:0}
.report-block .label{font-size:0.66rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;flex-shrink:0;width:48px;padding-top:1px}
.report-block .text{font-size:0.82rem;line-height:1.45;flex:1;font-style:italic}
.report-block .copy-btn{padding:6px 10px;border:none;cursor:pointer;border-radius:var(--radius-sm);font-family:var(--font-ui);font-size:0.7rem;font-weight:700;background:rgba(0,0,0,0.06);color:var(--muted);flex-shrink:0;transition:all .15s}
.report-block .copy-btn:hover{background:rgba(0,0,0,0.1);color:var(--ink)}
.report-block .copy-btn.copied{background:var(--good-bg);color:var(--good)}
.report-block.define{background:var(--define-bg)}.report-block.define .label{color:var(--define)}.report-block.define .text{color:var(--define)}
.report-block.direct{background:var(--direct-bg)}.report-block.direct .label{color:var(--direct)}.report-block.direct .text{color:var(--direct)}
.report-block.defer{background:var(--defer-bg)}.report-block.defer .label{color:var(--defer)}.report-block.defer .text{color:var(--defer)}

/* IL NOTE */
.il-note{padding:8px 12px;background:var(--warn-bg);border-radius:var(--radius-sm);font-size:0.78rem;color:var(--warn);line-height:1.4;display:flex;align-items:flex-start;gap:6px}
.il-note .flag{font-size:0.9rem;flex-shrink:0}

/* HAZARD */
.hazard{background:var(--danger-bg);border:1.5px solid rgba(166,58,42,0.3);border-radius:var(--radius-md);padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.hazard .h-icon{font-size:1.2rem;flex-shrink:0}
.hazard .h-body{flex:1}
.hazard .h-title{font-size:0.84rem;font-weight:700;color:var(--danger)}
.hazard .h-desc{font-size:0.78rem;color:var(--danger);margin-top:2px;line-height:1.4}

/* ICA FIELD BADGE */
.ica-field{background:linear-gradient(135deg,#f8f5ef,#f2ece0);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:var(--radius-sm);padding:8px 12px}
.ica-field .ica-label{font-family:var(--font-ui);font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent-strong);margin-bottom:4px;display:block}
.ica-field .ica-val{font-family:'Courier New',monospace;font-size:0.82rem;color:var(--ink);line-height:1.5}

/* TOGGLE BUTTONS (for Yes/No/NA fields) */
.toggle-row{display:flex;gap:6px;flex-wrap:wrap}
.toggle-btn{padding:8px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--line);background:#fff;cursor:pointer;font-family:var(--font-ui);font-size:0.78rem;font-weight:600;transition:all .15s;min-height:38px;display:inline-flex;align-items:center}
.toggle-btn:hover{border-color:rgba(184,90,47,0.3);background:var(--accent-soft)}
.toggle-btn.active-yes{background:var(--good);border-color:var(--good);color:#fff}
.toggle-btn.active-no{background:var(--danger);border-color:var(--danger);color:#fff}
.toggle-btn.active-na{background:var(--muted);border-color:var(--muted);color:#fff}
.toggle-btn.active-neutral{background:var(--accent);border-color:var(--accent);color:#fff}

/* INLINE FIELD ROW */
.field-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.field-row:last-child{border-bottom:none}
.field-row .f-label{font-size:0.82rem;font-weight:600;flex:1;min-width:0}
.field-row .f-label .f-tip{font-weight:400;font-size:0.72rem;color:var(--muted);display:block}

/* ID HELPER */
.id-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.id-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px;font-size:0.78rem;line-height:1.4;cursor:pointer;transition:all .15s}
.id-card:hover{border-color:var(--accent);background:var(--accent-soft)}
.id-card .mat-name{font-weight:700;font-size:0.76rem;color:var(--accent-strong);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em}
.id-card .id-clue{color:var(--muted);font-size:0.74rem}

/* LIVE SUMMARY */
.summary{background:#fff;border:1px solid var(--line);border-radius:var(--radius-md);padding:12px 14px}
.summary .s-title{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent-strong);margin-bottom:8px}
.summary .s-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:0.82rem}
.summary .s-val{font-weight:600}
.summary .s-val.empty{color:var(--muted);font-style:italic;font-weight:400}

/* FINDING CONTEXT (does this apply?) */
.finding-context{margin-bottom:10px}
.ctx-label{font-size:0.76rem;font-weight:700;color:var(--ink);margin-bottom:6px}
.ctx-grid{display:grid;gap:4px}
.ctx-yes{padding:6px 10px;border-radius:var(--radius-sm);background:var(--good-bg);color:var(--good);font-size:0.78rem;line-height:1.3;display:flex;align-items:center;gap:6px}
.ctx-yes::before{content:"\2713";font-weight:700;flex-shrink:0}
.ctx-no{padding:6px 10px;border-radius:var(--radius-sm);background:rgba(0,0,0,0.03);color:var(--muted);font-size:0.78rem;line-height:1.3;display:flex;align-items:center;gap:6px}
.ctx-no::before{content:"\2717";font-weight:700;flex-shrink:0;color:var(--muted)}

/* FINDING EXPECT (what does good look like?) */
.finding-expect{margin-bottom:10px}
.expect-list{display:grid;gap:3px}
.expect-list div{font-size:0.78rem;line-height:1.4;color:var(--ink);padding:4px 0}

/* FINDING GUIDANCE (result blocks) */
.finding-guidance{padding:10px 12px;border-radius:var(--radius-sm);margin-bottom:8px;display:grid;gap:4px}
.good-guidance{background:var(--good-bg);border-left:3px solid var(--good)}
.warn-guidance{background:var(--warn-bg);border-left:3px solid var(--warn)}
.danger-guidance{background:var(--danger-bg);border-left:3px solid var(--danger)}
.g-title{font-size:0.82rem;font-weight:700;color:var(--ink)}
.good-guidance .g-title{color:var(--good)}
.warn-guidance .g-title{color:var(--warn)}
.danger-guidance .g-title{color:var(--danger)}
.g-note{font-size:0.76rem;line-height:1.4;color:var(--muted)}

/* CAN'T SAY (what NOT to report) */
.cant-say{background:#fff;border:1.5px dashed var(--danger);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:8px}
.cant-title{font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--danger);margin-bottom:3px}
.cant-say div:not(.cant-title){font-size:0.78rem;color:var(--ink);font-style:italic;line-height:1.4}

/* STUDY SECTION */
.study-toggle{padding:10px 14px;background:var(--accent-soft);border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:8px;font-size:0.78rem;font-weight:700;color:var(--accent-strong);text-transform:uppercase;letter-spacing:0.06em}
.study-toggle .arrow{transition:transform .2s}
.study-toggle.open .arrow{transform:rotate(90deg)}
.study-body{padding:14px;display:grid;gap:10px;font-size:0.82rem;line-height:1.5;color:var(--muted)}
.study-body p{margin:0}
.study-body strong{color:var(--ink)}

/* FINDING CARD */
.finding{border-radius:var(--radius-md);overflow:hidden;border:1px solid rgba(166,58,42,0.2);animation:slideIn .2s ease}
.finding-header{padding:10px 14px;background:var(--danger-bg);display:flex;align-items:center;gap:8px}
.finding-header .tag{font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--danger)}
.finding-header .desc{font-size:0.84rem;font-weight:600;flex:1}
.finding-body{padding:12px 14px;background:#fff}

.hidden{display:none}

/* ============================================
   EMPTY STATE
   ============================================ */
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state .es-icon{font-size:2rem;margin-bottom:10px}
.empty-state .es-title{font-size:0.9rem;font-weight:700;margin-bottom:4px}
.empty-state .es-desc{font-size:0.78rem;line-height:1.4}

/* ============================================
   SEARCH BAR
   ============================================ */
#search-bar{
  position:sticky;top:calc(var(--top-bar-h) + var(--nav-h));z-index:98;
  background:var(--bg);padding:8px 10px;border-bottom:1px solid var(--line);
}

          "study": {
            "whatItIs": "Permanently installed heating equipment and its distribution system. Heating is inspected LAST in the inspection sequence because you turned it on first -- by now it's at operating temperature.",
            "howToInspect": "Read data plate, decode serial for age, check filter, measure delta-T, inspect heat exchanger (visible portions only), check venting system, check distribution (ductwork/radiators), check safety controls, check combustion air. For boilers: check pressure gauge, expansion tank, circulator, radiators.",
            "details": [
              "FURNACE TYPES BY VENTING: Natural draft (60-65% eff, draft hood, B-vent/chimney) --> Induced draft (80-83% eff, inducer motor, metal vent) --> Condensing (90%+ eff, PVC vent, condensate drain). You can identify the type by the vent material and presence of inducer/condensate.",
              "IGNITION TYPES: Standing pilot (constant small flame, older), Electronic spark ignition (click-click, newer), Hot surface igniter (glowing element, most common current). Pilot out = defect. Do NOT relight.",
              "EXPECTED LIFE: Gas furnace 15-25 years. Oil furnace 15-25 years. Gas boiler 20-35 years. Electric furnace 20-30 years. Heat pump 10-15 years.",
              "HEAT EXCHANGER: Primary (main heating) and secondary (condensing units have a second one). Visual-only inspection through burner ports and access panels. Look for cracks, rust, holes, distorted flame. A cracked heat exchanger is the #1 safety concern -- CO enters living space.",
              "DELTA-T HEATING: Supply should be 40-70°F above return for furnaces. Heat pump: 15-30°F. High (>70°F furnace) = restricted airflow. Low (<40°F furnace) = underperformance. Measure at closest supply register and at return grille.",
              "VENT CLEARANCES: Single-wall connector: 6\" from combustibles. B-vent (double-wall): 1\" from combustibles. Type L (oil): per listing. PVC (condensing): per manufacturer. Male end UP on vent connectors.",
              "BOILER SPECIFICS: Hot water system: 12-15 psi cold, 15-30 psi hot. Steam system: 0.5-2 psi operating. Expansion tank: if completely full of water when tapped (no air cushion sound), bladder has failed -- pressure relief valve may weep. Circulator pump: should run quietly. Zone valves: actuators should click and zone should get hot.",
              "DISTRIBUTION TYPES: Forced air (most common -- ductwork, registers, return grilles). Hydronic/hot water (baseboard convectors, radiators, radiant floor). Steam (cast iron radiators, one-pipe or two-pipe). Electric baseboard. Radiant ceiling.",
              "OIL FURNACE SPECIFICS: Fuel oil tank (look for oil stains, rust, fill and vent pipes outside). Oil filter (should be clean). Barometric damper (weighted plate on vent pipe). Emergency disconnect switch (usually red plate switch, top of stairs or near unit). Combustion chamber (refractory lining).",
              "SAFETY CONTROLS: High-limit switch, flame rollout switch, pressure switch (induced draft), gas valve, thermocouple/flame sensor. If ANY is bypassed, report immediately.",
              "FURNACE EFFICIENCY TIERS: Low efficiency (natural draft, draft hood visible, 60-65% AFUE) -- oldest type, pulls combustion air from the room. Mid efficiency (induced draft, small inducer fan/motor visible, 80-83% AFUE) -- inducer starts before burner lights, you'll hear it. High efficiency / condensing (90%+ AFUE) -- PVC vent pipes through wall, produces acidic condensate, two PVC pipes (intake + exhaust) 12-24 inches apart on exterior wall.",
              "IDENTIFYING FURNACE TYPE FROM OUTSIDE: If you see PVC pipes coming through the exterior wall during your outside walk-around, there's a high-efficiency condensing furnace inside. The exhaust pipe (combustion products) is typically on top, the air intake on the bottom. Concentric vents (pipe-within-pipe) are also used. Metal chimney vent = natural draft or induced draft.",
              "FORCED AIR CONFIGURATIONS: Up-flow (most common -- blower below burners, pushes air up), Down-flow / counter-flow (blower above burners, pushes air down -- common in homes on slabs or over crawl spaces with under-floor ductwork), Horizontal (older style, blower next to burners -- mostly replaced now with up-flow or down-flow units using conversion kits).",
              "COMBUSTION FURNACE PROHIBITED LOCATIONS: Combustion furnaces should NOT be in bedrooms, bathrooms, bedroom/bathroom closets, or spaces accessed through bedrooms/bathrooms. Exceptions: attic furnace accessed from bedroom is OK (furnace is far from sleeping area); 90%+ sealed high-efficiency units may be OK in bedrooms in some jurisdictions (sealed combustion chamber, outside air intake). Propane units in basements/pits require mechanical ventilation (propane is heavier than air and settles).",
              "CLEARANCE FROM COMBUSTIBLES: Check the furnace's listing/clearance chart (usually a metal plate on the unit). Listed gas-fired units use B-vent (double-wall). Listed oil-fired units use L-vent (hotter exhaust). Most modern furnaces are zero-clearance on back and sides. Front typically needs 3 inches minimum. Any flame or spark device must be minimum 18 inches above garage floor.",
              "ELECTRIC FORCED AIR FURNACES: Contain 3-5 heating coils (elements) at approximately 5 kW each. Sequencers activate coils at 30-90 second intervals to prevent a massive surge on the electrical system. No combustion, no venting, no gas line. Inspect: elements, sequencers, blower, wiring connections. Higher operating cost than gas but simpler system with fewer safety concerns.",
              "FAN LIMIT SWITCH: Controls when the blower fan turns on and off, and provides high-temperature safety cutoff. Fan turns ON when heat exchanger reaches approximately 125°F. High limit (safety cutoff) typically at 200°F -- shuts off the burner if the heat exchanger overheats (usually from restricted airflow like a filthy filter or blocked ducts). If the high limit keeps tripping, check the filter first.",
              "DUCTWORK TYPES AND DEFECTS: Steel (most common, rigid), Rigid fiberglass board (duct board -- insulated, can deteriorate), Flex-duct (flexible insulated tube -- common for branch runs, must be properly supported and not kinked), Transite (asbestos-containing material from 1940s-1950s -- rigid, not metal, not plastic -- recommend testing by environmental consultant). Under-slab ductwork: remove floor registers to inspect -- check for rust, standing water, mold, damage from slab pour. Dirty registers throughout the house indicate filter problems.",
              "ALL HABITABLE ROOMS NEED PERMANENT HEAT: Every habitable room must have a permanent heating source. If a room has no register, no radiator, no baseboard -- it either wasn't designed as habitable space, or the heating system is deficient. This is especially common in finished basements and additions.",
              "BOILER CATEGORIES: Steam boilers (only type that actually boils water, in use since mid-1800s). Hydronic/hot water boilers come in two types: Circulated (uses a pump -- most common by far) and Gravity (old system, no pump, depends on convection of hot water rising through pipes -- if you see one, it's very old). How to tell them apart: sight glass (gauge glass) on the side = steam boiler. Circulating pump visible = circulated hot water boiler. No pump and no sight glass and looks old = gravity system.",
              "STEAM BOILER SPECIFICS: One-pipe or two-pipe systems. Normal operating pressure is 0.5-2 PSI (if higher than 2 PSI, something is wrong). Operating temperature 215-218°F (return condensate about 210°F). Relief valve set to blow at 15 PSI. Must have a water level gauge (sight glass) -- normal starting level 1/2 to 2/3 full, normal operating level about 1/3 full or less. Should have a Hartford Loop (prevents boiler from running dry due to leaks in return lines). Float-type low water cutoff with blowdown valve should be flushed periodically.",
              "CIRCULATED (HOT WATER) BOILER SPECIFICS: Pressure gauge should read 12-15 PSI cold, 15-30 PSI when hot. Expansion tank absorbs pressure from thermal expansion -- if tank feels completely full of water when tapped (no hollow sound), the bladder has failed and pressure relief valve may weep. Circulator pump should run quietly when thermostat calls for heat. Zone valves control which areas get heat. Check each radiator/baseboard in every room for heat output.",
              "BOILER HEAT DISTRIBUTION: Cast iron radiators (steam or hot water), baseboard convectors (fin-tube -- most common modern hydronic), radiant floor heating (PEX tubing embedded in floor or slab -- warm floors, very comfortable, hard to inspect), convectors (wall-mounted units). A boiler is a pressure vessel -- water expands when heated, so relief valves and expansion tanks are required. Boilers do NOT move air, so no filters, blowers, or ducts are needed.",
              "SPACE HEATER CLEARANCES: Direct vent space heaters require 36 inches clearance on top, 12 inches on sides, 24 inches in front. Wall heaters (any type) must be minimum 12 inches from edge of any door and never behind a door. Electric wall/baseboard units get over 200°F -- keep electrical cords, drapes, and furniture well clear. Floor furnaces should be periodically cleaned (hair, dust, debris, small toys fall through the grille).",
              "VENTLESS GAS HEATERS: Banned or restricted in many jurisdictions. Use oxygen depletion sensors (ODS) that shut off gas when O2 drops below 18% -- but these are considered unreliable. ICA recommended report language: 'A ventless gas heater is installed. These heaters add moisture and combustion products directly into the living space. Some jurisdictions prohibit their use. Recommend evaluation by a qualified HVAC contractor.' Combustion heaters should never be in bedrooms or bathrooms unless they are sealed direct-vent units.",
              "FIREPLACE AND WOOD STOVE (ASHI SOP Section 12): Inspect fuel-burning fireplaces, stoves, fireplace inserts, fuel-burning accessories, chimneys and vent systems. NOT required to inspect interiors of flues/chimneys that are not readily accessible, fire screens/doors, seals/gaskets, or move fireplace inserts. Wood stove clearances from combustibles: typically 36 inches (check manufacturer listing). Stovepipe (single-wall connector) requires 18 inches from combustibles. Class A chimney required where passing through walls or ceilings.",
              "FURNACE TYPE IDENTIFICATION FLOWCHART (STUDY): STEP 1: Look at the vent. IF PVC pipe through the wall --> HIGH EFFICIENCY / CONDENSING (90%+ AFUE). These are sealed combustion, forced draft. Combustion air piped from exterior. Produces acidic condensate. Two PVC pipes on exterior wall (intake + exhaust). IF metal vent pipe to chimney --> Go to Step 2. IF no vent at all --> ELECTRIC (no combustion, no venting needed). STEP 2: Look at the top of the furnace. IF you see a draft hood (open cone-shaped diverter) --> NATURAL DRAFT (60-65% AFUE). Oldest type, no longer manufactured. Open burners you can look right inside. Combustion products leave by natural convection only. IF you see a small inducer motor/fan --> INDUCED DRAFT (80-83% AFUE). Most common type. Has monoport or in-shot burners. Inducer gives combustion products a boost out. You will hear the inducer start BEFORE the burner lights. STEP 3: Once you know the type, you know what to check.",
              "COMPLETE FURNACE PARTS REFERENCE (STUDY): UNIVERSAL PARTS (all furnaces): (1) Data plate (brand, model, serial, BTU input/output, AFUE, fuel type). (2) Filter (location, size, type, condition). (3) Blower motor and housing (inside blower compartment). (4) Supply plenum (sheet metal above furnace connecting to ductwork). (5) Return air plenum and grille. (6) Thermostat wiring. (7) Electrical disconnect or switch. GAS FURNACE PARTS: (8) Gas shutoff valve and supply line with sediment trap/drip leg. (9) Burner assembly (ribbon burners in natural draft, monoport/in-shot in induced draft). (10) Heat exchanger (series of steel baffles -- separates combustion from circulation air). (11) Ignition system (pilot, spark, or HSI). (12) Vent connector to chimney or wall. (13) Combustion air supply openings. (14) Safety controls: high-limit switch (shuts off at ~200F), flame rollout switch, pressure switch (induced draft only), gas valve, thermocouple or flame sensor. HIGH-EFFICIENCY ADDITIONS: (15) Secondary (condensing) heat exchanger. (16) Condensate drain, trap, and neutralizer (acidic condensate, pH ~3-4). (17) PVC vent termination with proper clearances. ELECTRIC FURNACE PARTS: (8) Heating elements (3-5 resistance coils, ~5 kW each, like large toaster coils). (9) Sequencers (stagger element activation at 30-90 second intervals). (10) Fan limit switch (same function as gas furnace). (11) Dedicated circuit breakers sized for element load.",
              "COMPLETE BOILER PARTS REFERENCE (STUDY): (1) Data plate. (2) Burner (gas or oil -- same types as furnace). (3) Pressure/temperature gauge (combination gauge showing both). (4) Temperature and pressure relief valve with discharge pipe (NEVER capped, terminates 6 inches above floor or to drain). (5) Expansion tank -- diaphragm type (modern, usually hung from ceiling near boiler) or plain steel (older, larger, usually in attic or high point). (6) Circulator pump (hot water systems -- motor mounted on pipe, pumps heated water through system). (7) Zone valves (motorized valves controlling flow to different heating zones). (8) Supply piping (hot water out) and return piping (cooled water back). (9) Vent connector (same as furnace -- slope up, proper clearances). (10) Combustion air supply. STEAM-ONLY: (11) Sight glass/gauge glass (shows water level inside boiler). (12) Low-water cutoff (float-type safety device). (13) Hartford Loop (return piping configuration near boiler). (14) Pressuretrol (pressure-activated switch that controls burner). HOT WATER ONLY: (14) Backflow preventer / pressure reducing valve (automatic fill valve). (15) Air vents/bleeders on radiators. (16) Flow check valve (prevents gravity circulation when pump is off).",
              "HVAC REPORTING BOUNDARIES (STUDY -- CRITICAL FOR EXAM AND PRACTICE): WHAT YOU CAN REPORT: 'Heat exchanger -- visible portions inspected, no visible defects at accessible areas.' 'Flame pattern appeared [normal/abnormal] at viewing port.' 'CO reading of [X] ppm detected at [location].' 'Unit is approximately [X] years old. Typical service life is [Y] years.' 'Rust/corrosion/damage observed at [specific location].' 'Safety control appears to have been bypassed.' WHAT YOU CANNOT REPORT: 'Heat exchanger is in good condition' (you can only see a small portion). 'Heat exchanger is cracked' (you are not qualified -- HVAC tech with camera determines this). 'This furnace needs to be replaced' (you do not determine remaining life). 'This furnace has [X] years left' (you cannot predict equipment lifespan). 'The heating system is adequate for this home' (adequacy determination is excluded from SOP). ALWAYS END WITH: 'Recommend evaluation by a qualified HVAC contractor' for any deficiency or concern."
            ]

            "CLEARANCE: You need 36\" of clear space in front of the panel and 30\" wide, 78\" high. If it's blocked by storage, document the limitation. This clearance is for emergency access — you need to be able to reach the panel quickly to shut off power.",
            "DOUBLE-TAPPED BREAKERS: two wires connected to one breaker terminal. Unless the breaker is specifically rated for two wires (look for markings like '2 wires' or 'CTL' on the breaker, or check if it's a Square D QO tandem-rated), this is a defect. Very common — found in most panels. The problem: if one wire loosens, arcing can occur.",
            "WIRE GAUGE / BREAKER MISMATCH: 14 AWG (white sheath NM) = 15A max. 12 AWG (yellow sheath) = 20A max. 10 AWG (orange sheath) = 30A max. If you see 14 AWG wire on a 20A breaker, the wire can overheat before the breaker trips. This is called 'overfusing' and is a fire hazard.",
            "ALUMINUM BRANCH WIRING: Look at the wires going to individual breakers. If they're silver/gray (aluminum) instead of copper (orange/brown), note it. Solid conductor aluminum branch wiring (common in 1965-1973 homes) expands and contracts more than copper when heated, loosening connections over time = fire risk. Report its presence. Remediation: COPALUM crimps or AlumiConn connectors at every connection point. NOT all aluminum is a problem — service entrance conductors are ALWAYS aluminum and that is normal. BRANCH circuit aluminum (#12 and #10 to receptacles and lights) is the concern.",
            "GROUNDING: look for a bare copper wire (grounding electrode conductor/GEC) going from the panel to a ground rod outside (driven copper rod) and/or to the metal water supply pipe (within 5 ft of where it enters the house). It should be continuous with no splices (or properly listed splices). If the water pipe is plastic (PEX/CPVC), it can't serve as the grounding electrode.",
            "BONDING (main panel only): In the MAIN panel, the neutral bus and ground bus should be bonded together (connected by a bonding screw or strap). This is correct ONLY in the main panel. In sub panels, they must be SEPARATED.",
            "FPE (Federal Pacific) Stab-Lok and ZINSCO panels: known defective panels with documented 25-74% failure rates. Breakers may not trip during overcurrent, creating fire risk. If you see either brand name, note it prominently. Other flagged brands: Pushmatic (push-button breakers), Sylvania/GTE-Sylvania (Zinsco rebrands), Challenger (some models with THQL breakers had bus bar overheating issues).",
            "Look for signs of overheating: discolored wires (copper turns black when overheated), melted insulation, scorching on bus bars or breakers, warm breakers to touch (don't touch inside panel — visual inspection only). Any evidence of overheating = immediate electrician referral.",
            "MAIN DISCONNECT: Most panels have a single main breaker that disconnects all power. Some older installations use up to 6 breakers as 'main disconnects' (6-throw rule — you must be able to disconnect all power in 6 or fewer hand movements). If there's no main disconnect AND more than 6 breakers, that's a defect.",
            "MISSING KNOCKOUTS: open holes in the panel box where a cable/conduit was removed or never installed. These allow pests, debris, and fingers into the panel. Each opening should have a knockout filler plug.",
            "DETERMINING SERVICE AMPERAGE (DECISION TREE): You need THREE pieces of information to confirm amperage: (1) Main breaker rating, (2) Service entrance conductor size, (3) Panel rating label. IF all three agree --> report confidently. IF two agree --> report based on those two sources. IF two CONFLICT --> report the LOWER value (the weakest link limits the system). IF only one available --> report it as 'appeared to be' with qualification. IF none available --> 'Service amperage unknown. Recommend evaluation by a licensed electrician.' The WEAKEST single piece of evidence is the breaker alone, because someone could have installed a smaller breaker on larger-rated wiring or vice versa.",
            "WIRE-TO-AMPERAGE REFERENCE TABLE: 4/0 aluminum OR 2/0 copper = 200A service. 2/0 aluminum OR 1/0 copper = 150A service. 1/0 aluminum OR #4 copper = 100A service. #6 aluminum OR #8 copper = 60A service. USE THIS TABLE when you can see the service entrance conductors but the panel label is missing or illegible.",
            "PANEL EVALUATION FLOWCHART: STEP 1: Read the label — brand, amperage rating, voltage. STEP 2: Is the brand a known hazard? (FPE, Zinsco, Pushmatic, Challenger). STEP 3: Remove dead-front cover (if safe and not FPE/Zinsco). STEP 4: Check for double-tapped breakers. STEP 5: Check wire gauge matches breaker amperage. STEP 6: Check for aluminum branch wiring. STEP 7: Check bonding screw (main panel) or separated neutrals (sub panel). STEP 8: Check for open knockouts. STEP 9: Check for scorching, melting, discolored wires.",
            "GROUNDING vs BONDING DECISION TREE (MAIN PANEL): (A) Bonding screw or strap connecting neutral bus to panel enclosure — SHOULD be present at main panel. (B) GEC — bare copper, typically #4 or #6 — running from panel to water pipe, ground rod, or Ufer. IF bonding is present AND GEC is visible --> properly installed. IF bonding is MISSING --> DEFECT. IF GEC not visible --> report limitation. IF water supply is plastic AND no ground rod visible --> heightened concern.",
            "WIRE GAUGE FIELD IDENTIFICATION: #14 AWG = matchstick diameter, white NM sheath (post-2001). #12 AWG = finish nail diameter, yellow NM (post-2001). #10 AWG = pencil lead diameter, orange NM (post-2001). #8 AWG = thin crayon, black NM. #6 AWG = very thick, black NM. CRITICAL: Pre-2001 NM cable is ALL white or black regardless of gauge. Read jacket markings or compare thickness.",
            "ELECTRICAL REPORTING RULES: You report what you SEE, not what you KNOW. Use 'at the time of inspection,' 'appears to be,' 'based on visible evidence.' Never use 'code violation,' 'must be replaced,' 'safe/unsafe,' 'legal/illegal.' Frame findings as safety concerns, not code citations.",

          "study": {
            "whatItIs": "The main electrical distribution panel. Utility power enters through the service entrance, goes through the meter, enters the panel, and is distributed to individual branch circuits throughout the house.",
            "howToInspect": "Visual inspection of the panel interior (if dead-front cover can be safely removed with a screwdriver — DO NOT remove the inner cover that exposes bus bars). Test GFCI and AFCI breakers by pressing their test buttons. Use your 3-light tester on receptacles throughout the house.",
            "details": [
              "SERVICE SIZE: 60A = very old, inadequate for modern loads. 100A = adequate for smaller homes without central A/C or electric heat. 150A = good. 200A = modern standard. Under 100A may need service upgrade for modern electrical demands.",
              "WIRE GAUGE / BREAKER TABLE: 14 AWG (white NM sheath) = 15A. 12 AWG (yellow) = 20A. 10 AWG (orange) = 30A. 8 AWG (black) = 40A. 6 AWG (black) = 50-60A. NM cable colors were standardized around 2001 — older NM cable may all be white or gray regardless of gauge.",
              "DOUBLE-TAPPED: Two wires under one breaker terminal screw. Unless breaker is rated for two conductors (e.g., Square D QO with specific markings), this is improper. Very common — check EVERY breaker.",
              "ALUMINUM BRANCH WIRING: 1965-1973 era. Solid aluminum at connections overheats due to higher thermal expansion rate (creep). Look for 'AL' or 'ALUMINUM' markings on wire jacket. Silver-colored wire (copper is orange/brown). Remediation: COPALUM crimp method (most reliable), AlumiConn set-screw connectors, or CO/ALR-rated devices. NOT all aluminum is a problem — service entrance conductors are always aluminum. It's the BRANCH circuit aluminum (#12, #14 to receptacles/lights) that is the fire hazard.",
              "WIRING METHODS: NM cable (Romex — plastic-sheathed, most common), Armored cable (BX = older no ground wire / MC = newer with ground wire, metal spiral jacket), Knob-and-tube (porcelain insulators, individual conductors, pre-1950, no ground wire, may be functional but insurance issues), Conduit (metal or plastic tubing with individual wires pulled through).",
              "FPE STAB-LOK DETAIL (Module 23): Stab-Lok panels from the 1960s-1970s. Up to 74% failure rate for double-pole breakers — three out of four will not trip regardless of amperage. Have non-interchangeable 'E' and 'F' type breakers that fit poorly and sometimes fall out when cover is removed. Cover is difficult to remove because breaker handles are taller than typical. FPE expert Jesse Aronstein, Ph.D., P.E. states Stab-Lok breakers may be associated with up to 2,800 electrical fires each year. DO NOT remove the cover on these panels.",
              "ZINSCO DETAIL (Module 23): Found in 1950s-1960s era homes. Have parallel flat bus bars that allow breakers to move — breakers can slide back and forth and sometimes fall right off the bus bar when cover is removed. The loose fit causes arcing and overheating between breaker and bus bar. Breakers are also known for not tripping. Identify by multi-colored handle ties and diamond-shaped logo. Sylvania/GTE-Sylvania are Zinsco rebrands. Exterior type-3 Zinsco has an inner cover that may contact SE conductors during removal.",
              "GFCI BREAKERS: Have test/reset buttons on the breaker face. Protect the entire circuit. Required locations: kitchen countertop receptacles, bathrooms, garages, outdoors, crawlspaces, unfinished basements, within 6 ft of laundry/utility sink, boat houses, pool areas.",
              "AFCI BREAKERS: Have test buttons on breaker face. Required on bedroom circuits (and in newer codes: living rooms, dining rooms, closets, hallways). Protect against arc faults (sparking from damaged wires, loose connections).",
              "3-LIGHT TESTER PATTERNS: All 3 lit = correct. Right two lit = open ground (no ground wire connected). Left + center = reverse polarity (hot and neutral swapped). Center only = open neutral. None lit = no power or open hot.",
              "BONDING: Neutral bus and ground bus bonded together in MAIN panel only (via bonding screw). Must be SEPARATED in sub panels. If bonded in sub panel, return current flows on ground wire — can energize metal fixtures and enclosures.",
              "KNOB-AND-TUBE: Not inherently dangerous if in good condition, properly maintained, and NOT buried in insulation. Problems: no ground wire, not rated for modern loads, deteriorated insulation (rubber/cloth). Insurance companies often won't insure homes with active K&T.",
              "PANEL TERMINOLOGY (Module 22): Service entrance conductors enter from overhead service drop or underground service lateral through the meter. Main lugs = connection points for SE conductors. Main disconnect (main breaker) rated at 60A/100A/200A. Branch circuit breakers distribute power to individual circuits. Bus bars = where neutral and ground wires terminate. Cabinet (tub, enclosure) = the metal box. GEC = grounding electrode conductor connecting panel to ground rod/pipe/plate. Bonding screw connects cabinet into ground path.",
              "NEC CONDUCTOR TERMINOLOGY (Module 22): Hot wires = 'ungrounded conductors' (bring current to loads). Neutral wires = 'grounded conductors' (return current to transformer). Ground wires = 'equipment grounding conductors' (EGCs). Neutrals are called 'grounded' because they are bonded to the ground system in the main panel.",
              "BONDING SCREW FUNCTION (Module 22): In a Romex (NM) panel, the bonding screw connects the cabinet/enclosure into the ground path for safety. In a conduit system, the bonding screw brings grounds and neutrals together. Bonding = permanently connecting metal components together for grounding. Provides a low-resistance fault path to trip the breaker.",
              "BRANCH CIRCUIT GROUNDING HISTORY (Module 22): Branch circuit grounding was not required by NEC until 1962. Homes pre-1962 commonly have ungrounded outlets — not a code violation for original installation but a safety concern. Surge protectors will NOT provide protection without a proper ground path.",
              "MIXED BREAKER BRANDS (Module 22): Only breakers listed and approved for that specific panel should be installed. A GE breaker in a Square D panel is a defect — even if it physically fits. Check panel label for approved breaker types.",
              "SINGLE-POLE vs DOUBLE-POLE (Module 22): Single-pole = 120V circuit (one hot wire). Double-pole = 240V circuit (two hot wires) — used for A/C, dryer, range, water heater. Double-pole breakers are ganged together so both poles trip simultaneously.",
              "NM CABLE SECURING (Module 21): NM (Romex) cable must be secured within 12 inches of any junction box, panel, or fixture. Unsecured cable hanging loose near the panel is a defect.",
              "PANEL CLEARANCE (Module 22): 36 inches of clear space required in front (30 inches wide, 36 inches deep, 78 inches high from floor). No storage, shelving, or obstructions within this working space.",
              "PANELS IN CLOSETS (Module 23): No longer allowed by current NEC. Panels don't belong in areas with flammable materials. Originally installed closet panels are grandfathered but if hidden by hanging clothes, no one will know where the panel is in an emergency.",
              "OUTDOOR PANELS (Module 23): Must be NEMA type 3 enclosure (weather-resistant). Type 1 enclosures (interior type) used outdoors = defect. Should NOT be caulked to siding. Surface-mounted should have 1/4\" clearance from wall.",
              "SAFETY DURING PANEL INSPECTION (Module 22): The panel is inspected while live (hot). Remove only the dead-front cover. NEVER remove the inner cover that exposes bus bars. Never put your hands inside. Visual inspection only. Take photos.",
              "REPORTING ELECTRICAL DEFECTS (Module 23): Report ALL electrical defects regardless of severity — report in terms of safety, not code. Frame findings as safety concerns. If you wouldn't want it in your own home, put it on the report.",
              "AMPERAGE DETERMINATION FLOWCHART (STUDY): Evidence --> What to Report. (1) All 3 agree --> report confidently. (2) 2 agree --> report with qualification. (3) ONLY wire visible --> report with limitation. (4) ONLY breaker visible --> report with limitation. (5) NOTHING --> 'Service amperage unknown.'",
              "GROUNDING AND BONDING DECISION TREE (STUDY): AT MAIN PANEL: Step 1 — Look for bonding screw (should be present). Step 2 — Look for GEC to ground rod, water pipe, or Ufer. IF both present --> properly installed. IF bonding missing --> DEFECT. IF GEC not visible --> limitation. IF water is PEX/CPVC --> cannot serve as electrode. AT SUB PANEL: Bonding screw should NOT be present.",
              "PANEL BRAND DECISION TREE (STUDY): Read label. Check brand: FPE/Stab-Lok --> DO NOT remove cover, 25-74% failure rate. Zinsco/diamond logo --> DO NOT remove cover, breakers fuse to bus. Sylvania/GTE-Sylvania --> Zinsco rebrands. Pushmatic --> obsolete, recommend evaluation. Challenger THQL --> check for overheating. Other --> proceed normally.",

          "study": {
            "whatItIs": "The cooling system including evaporator coil (indoor), condenser/compressor (outdoor), refrigerant lines, and condensate management. In Illinois, A/C is essential -- summer temps regularly exceed 90°F.",
            "howToInspect": "Verify system was turned on at start of inspection. Measure delta-T after system has run 10-15 minutes. Check condensate drain path. Check refrigerant lines. Check evaporator coil if accessible. Check outdoor condenser unit (level, clean, clearance). Check for secondary condensate protection if in attic.",
            "details": [
              "CENTRAL A/C SPLIT SYSTEM: Outdoor condenser/compressor + indoor evaporator coil. Connected by two refrigerant lines (suction line = large, insulated; liquid line = small, bare). Typical residential: 2-5 tons (1 ton = 12,000 BTU/hr of cooling).",
              "HEAT PUMP: Same hardware as A/C but includes a reversing valve to switch between heating and cooling. Check outdoor unit data plate for 'Heat Pump' designation. Has auxiliary/emergency heat strips for when outdoor temp drops below ~35°F (below which heat pump efficiency drops significantly). Defrost cycle: outdoor unit may steam/drip periodically in winter -- this is normal.",
              "MINI-SPLIT/DUCTLESS: Outdoor unit + wall-mounted indoor head units. Each head has its own thermostat/remote. Connected by small refrigerant lines through wall penetration. Common for additions, finished basements, or homes without ductwork. Multiple heads = multi-zone. One outdoor condenser can serve 4-5 indoor heads. Installation requires just a 3-inch hole in the exterior wall. Equipment cost approximately 30% more than conventional AC, but no ductwork cost makes it competitive. Most are bottom discharge, mounted near ceiling -- bottom discharge units must be minimum 6 feet above floor. Most units will not operate in cooling mode if interior temperature is below 70°F. AC-only mini-splits (not heat pumps) should not be operated when exterior temperature is below 65°F.",
              "MINI-SPLIT FILTERS: Most mini-splits have primary and secondary filters (some have a third). Filter access is from the front and bottom of the unit -- the front panel snaps open. Many filters can be vacuumed or washed rather than replaced. Filter indicator lights are common (typically every 400 hours of use). Advise client to clean or change filters monthly.",
              "HIGH-VELOCITY A/C (Hi-V): Uses 2-inch diameter plastic ducts instead of conventional large ductwork. Air handler distributes air through a large trunk line, then branches to 2-inch ducts that terminate at small round diffusers in floors, walls, or ceilings. The 2-inch ducts can be snaked around joists and inside walls, making Hi-V ideal for retrofitting older homes. Each 2-inch duct run should be minimum 6 feet long (acts as a muffler for noise) and maximum 30 feet (beyond that, too much friction loss). Floor-mounted diffusers should always have a grill to prevent debris from falling in.",
              "HIGH-VELOCITY OPERATING SPECS: Conventional A/C operates at 400-600 cfm/ton at low static pressure (large ducts). High-velocity A/C operates at up to 2,000 cfm at much higher static pressure (small 2-inch ducts). Delta-T for Hi-V systems: 20-30°F (compared to 14-22°F for conventional). Hi-V removes 30% more humidity than conventional central A/C, making it more energy efficient -- the thermostat can be set 2-3°F higher for the same comfort level. Hi-V provides cooling only (no heat through this system).",
              "DELTA-T is your primary diagnostic tool. COOLING: 14-22°F cooler at supply than at return (conventional). 20-30°F for Hi-V. Measure AFTER system runs 10-15 minutes to reach steady state. Record the actual number on your report. The delta-T is NOT required by the ASHI Standard of Practice, but it is the single most useful diagnostic measurement you can make. It tells you IF the system is performing, not WHY it is or is not.",
              "DELTA-T LOGIC (AC) -- COMPLETE DECISION TREE: STEP 1: Measure supply air temperature at the register CLOSEST to the air handler (not a distant register). STEP 2: Measure return air temperature at the return grille. STEP 3: Subtract: Return minus Supply = Delta-T. IF 14-22°F --> Normal. IF < 14°F --> Undercooling (low charge, dirty coil, compressor). IF > 22°F --> Restricted airflow (dirty filter, blocked registers, coil may be icing).",
              "CONDENSATE: As the evaporator coil cools air below its dew point, moisture condenses on the coil fins. This water drips into a drain pan and must drain away. Three options: floor drain (gravity), condensate pump (if no gravity drain available -- small pump in a box near the unit), or piped to exterior. If the drain is clogged, water backs up and floods.",
              "SECONDARY CONDENSATE PROTECTION: If the evaporator/air handler is in the ATTIC or above finished space, there MUST be secondary protection -- either a secondary drain pan with separate drain line, a condensate safety switch (float switch that shuts off system before overflow), or both. Without this, a clogged primary drain = water through the ceiling.",
              "ICING ON THE COIL: Visible frost or ice on the evaporator coil = DEFECT. Causes: restricted airflow (dirty filter is #1 cause, blocked registers), low refrigerant charge (leak), or blower not running at correct speed. If you see ice, note it and recommend HVAC evaluation.",
              "OUTDOOR CONDENSER: Check that it is level on its pad (tilted = compressor oil pooling issue). Check clearance -- 12-24\" from vegetation, walls, and other units for proper airflow. Dirty/blocked condenser fins = reduced capacity. Listen for unusual noises (grinding, screeching = failing bearings or compressor).",
              "REFRIGERANT LINE INSULATION: The large suction line MUST be insulated (black foam). Missing insulation = efficiency loss and possible condensation/drip damage. The small liquid line is NOT insulated -- that is normal.",
              "CONDENSATE PUMP: If no gravity drain is available, a small pump moves condensate to a drain. Check that it operates by pouring water into the reservoir. If the pump fails, water backs up.",
              "SIZING RULE OF THUMB: 1 ton of cooling per 400-600 sq ft of living space (varies with insulation, windows, climate). Oversized A/C = short cycling (turns on/off rapidly, does not dehumidify properly). Undersized = runs constantly, cannot keep up on hot days.",
              "REFRIGERANT TYPES: R-22 (Freon/HCFC) -- used until 2010, phased out by EPA due to ozone depletion. Many R-22 systems still in use, no legal requirement to remove. Recovered/recycled R-22 can be used, no deadline. R-410A (Puron/HFC) -- current standard. R-22 and R-410A are NOT interchangeable -- different vaporization points. When R-22 system is replaced, must use R-410A.",
              "REFRIGERANT DECISION TREE: Check data plate. IF R-22: note on report, inform client future refrigerant repairs may be costly, recommend budgeting for eventual replacement. IF R-410A: current standard, parts/service available. You are NOT licensed to check charge, add refrigerant, or open the system. Just check for ice (low charge indicator), oil stains at connections (possible leak), and insulation condition.",

/* ============================================
   STATE MANAGEMENT
   ============================================ */
var inspectionState = {};
var currentSectionId = null;
var currentComponentId = null;

function loadState() {
  try {
    var saved = localStorage.getItem('il-inspection-state');
    if (saved) inspectionState = JSON.parse(saved);
  } catch(e) { inspectionState = {}; }
  // Load top bar
  try {
    var tb = localStorage.getItem('il-inspection-topbar');
    if (tb) {
      var parsed = JSON.parse(tb);
      document.getElementById('property-address').value = parsed.address || '';
    }
  } catch(e) {}
}

function saveState() {
  try { localStorage.setItem('il-inspection-state', JSON.stringify(inspectionState)); } catch(e) {}
}

function saveTopBar() {
  try {
    localStorage.setItem('il-inspection-topbar', JSON.stringify({
      address: document.getElementById('property-address').value
    }));
  } catch(e) {}
}

function getComponentState(componentId) {
  if (!inspectionState[componentId]) {
    inspectionState[componentId] = {
      dataCapture: {},
      selectedType: null,
      checks: {},
      icaFields: {},
      rating: null,
      findings: {}
    };
  }
  return inspectionState[componentId];
}

function getProgress(componentId) {
  var state = inspectionState[componentId];
  if (!state) return { done: 0, total: 0 };
  var checks = state.checks || {};
  var done = 0;
  var total = 0;
  for (var k in checks) {
    total++;
    if (checks[k]) done++;
  }
  return { done: done, total: total };
}

function getOverallProgress() {
  var totalComponents = 0;
  var ratedComponents = 0;
  INSPECTION_DATA.sections.forEach(function(s) {
    if (!s.components) return;
    s.components.forEach(function(c) {
      totalComponents++;
      var state = inspectionState[c.id];
      if (state && state.rating) ratedComponents++;
    });
  });
  if (totalComponents === 0) return 0;
  return Math.round((ratedComponents / totalComponents) * 100);
}

function updateTopBarProgress() {
  var pct = getOverallProgress();
  var el = document.getElementById('top-bar-progress');
  el.textContent = pct + '%';
}

/* ============================================
   NAVIGATION
   ============================================ */
function buildSectionNav() {
  var nav = document.getElementById('section-nav');
  nav.innerHTML = '';
  INSPECTION_DATA.sections.forEach(function(section) {
    var pill = document.createElement('button');
    pill.className = 'section-pill';
    pill.setAttribute('data-section', section.id);
    pill.innerHTML = section.icon + ' ' + (section.name || section.title || section.id);
    pill.onclick = function() { selectSection(section.id); };
    nav.appendChild(pill);
  });
}

function selectSection(sectionId) {
  currentSectionId = sectionId;
  currentComponentId = null;

  // Clear search if active
  var sr = document.getElementById('search-results');
  if (sr) { sr.style.display = 'none'; sr.innerHTML = ''; }
  var si = document.getElementById('search-input');
  if (si) si.value = '';
  var sc = document.getElementById('search-clear');
  if (sc) sc.style.display = 'none';

  // Update pill active states
  document.querySelectorAll('.section-pill').forEach(function(p) {
    p.classList.toggle('active', p.getAttribute('data-section') === sectionId);
  });

  // Scroll active pill into view
  var activePill = document.querySelector('.section-pill.active');
  if (activePill) {
    try {
      activePill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    } catch (e) {
      activePill.scrollIntoView();
    }
  }

  // Show component list, hide detail
  document.getElementById('component-list').style.display = '';
  document.getElementById('component-detail').style.display = 'none';

  renderComponentList(sectionId);
}

function selectComponent(componentId) {
  currentComponentId = componentId;

  // Hide component list, show detail
  document.getElementById('component-list').style.display = 'none';
  document.getElementById('component-detail').style.display = 'block';

  // Find the component data
  var comp = findComponent(componentId);
  if (!comp) return;

  renderComponent(comp);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  currentComponentId = null;
  document.getElementById('component-detail').style.display = 'none';
  document.getElementById('component-list').style.display = '';
  // Re-render the component list to update progress indicators
  if (currentSectionId) renderComponentList(currentSectionId);
}

function findComponent(componentId) {
  for (var i = 0; i < INSPECTION_DATA.sections.length; i++) {
    var sec = INSPECTION_DATA.sections[i];
    if (!sec.components) continue;
    for (var j = 0; j < sec.components.length; j++) {
      if (sec.components[j].id === componentId) return sec.components[j];
    }
  }
  return null;
}

function findSection(sectionId) {
  for (var i = 0; i < INSPECTION_DATA.sections.length; i++) {
    if (INSPECTION_DATA.sections[i].id === sectionId) return INSPECTION_DATA.sections[i];
  }
  return null;
}

/* ============================================
   RENDER: Component List
   ============================================ */
function renderComponentList(sectionId) {
  var section = findSection(sectionId);
  if (!section) return;
  var container = document.getElementById('component-list');
  var html = '';

  // Section header
  html += '<div class="cl-header">';
  html += '<div class="cl-title">' + (section.icon || '') + ' ' + esc(section.name || section.title || '') + '</div>';
  if (section.description) html += '<div class="cl-desc">' + esc(section.description) + '</div>';
  if (section.icaRef) html += '<div class="cl-ica">' + esc(section.icaRef) + '</div>';
  if (section.cyaRules && section.cyaRules.length) {
    html += '<div class="cl-cya"><strong>CYA Rules</strong>';
    section.cyaRules.forEach(function(r) { html += esc(r) + '<br>'; });
    html += '</div>';
  }
  html += '</div>';

  // Component grid
  if (section.components && section.components.length) {
    html += '<div class="component-grid">';
    section.components.forEach(function(comp) {
      var progress = getProgress(comp.id);
      var state = inspectionState[comp.id];
      var rating = state ? state.rating : null;
      html += '<button class="component-card-btn" onclick="selectComponent(\'' + comp.id + '\')">';
      html += '<span class="ccb-icon">' + (comp.icon || '') + '</span>';
      html += '<span class="ccb-name">' + esc(comp.title || comp.id) + '</span>';
      if (progress.total > 0) {
        var pctClass = progress.done === progress.total ? ' done' : '';
        html += '<span class="ccb-progress' + pctClass + '">' + progress.done + '/' + progress.total + ' checks</span>';
      }
      if (rating) {
        html += '<span class="ccb-rating ' + rating.toLowerCase() + '">' + rating + '</span>';
      }
      html += '</button>';
    });
    html += '</div>';
  } else {
    html += '<div class="empty-state"><div class="es-icon">&#128203;</div><div class="es-title">No components</div><div class="es-desc">This section has no components defined yet.</div></div>';
  }

  container.innerHTML = html;
}

/* ============================================
   RENDER: Full Component Card
   ============================================ */
function renderComponent(comp) {
  var container = document.getElementById('component-detail');
  var state = getComponentState(comp.id);
  var html = '';

  // Breadcrumb
  var section = findSection(currentSectionId);
  if (section) {
    html += '<div class="breadcrumb">';
    html += '<a onclick="goBack()">' + (section.icon || '') + ' ' + esc(section.name || section.title || '') + '</a>';
    html += '<span class="bc-sep">&#9656;</span>';
    html += '<span>' + esc(comp.title || '') + '</span>';
    html += '</div>';
  }

  // Back button
  html += '<button class="back-btn" onclick="goBack()">&#8592; Back to components</button>';

  // Card shell
  html += '<div class="card">';
  html += '<div class="card-header"><span class="icon">' + (comp.icon || '') + '</span><h2>' + esc(comp.title || '') + '</h2></div>';
  html += '<div class="card-body" id="card-body-' + comp.id + '">';

  // 1. Data Capture
  if (comp.dataCapture && comp.dataCapture.length) {
    html += '<div class="section-label accent">Data Capture</div>';
    html += renderDataCapture(comp.id, comp.dataCapture, state);
  }

  // 2. Type Select
  if (comp.typeSelect) {
    html += renderTypeSelect(comp.id, comp.typeSelect, state);
  }

  // 3. Universal Checks (always shown)
  if (comp.universalChecks && comp.universalChecks.length) {
    html += '<div class="section-label">General Checks</div>';
    html += renderChecks(comp.id, comp.universalChecks, state, 'universal');
  }

  // 4. ICA Fields (component-level)
  if (comp.icaFields && comp.icaFields.length) {
    html += '<div class="section-label accent">ICA Fields</div>';
    html += renderIcaFields(comp.id, comp.icaFields, state);
  }

  // 5. Ref Tables (component-level)
  if (comp.refTables && comp.refTables.length) {
    comp.refTables.forEach(function(rt) { html += renderRefTable(rt); });
  }

  // 6. Rating (component-level, if no typeSelect has ratings or for universal)
  if (comp.rating || !comp.typeSelect) {
    html += renderRating(comp.id, comp.rating, state);
  }

  // 7. Red Flags
  if (comp.redFlags && comp.redFlags.length) {
    html += renderRedFlags(comp.redFlags);
  }

  // 8. Study
  if (comp.study) {
    html += renderStudy(comp.study);
  }

  // 9. Live Summary
  html += renderSummary(comp.id, comp, state);

  // 10. Related / See Also
  html += renderRelatedItems(comp.id);

  html += '</div></div>'; // close card-body, card

  container.innerHTML = html;

  // Restore state after DOM is rendered
  restoreComponentState(comp.id, comp, state);
}

/* ============================================
   RENDER: Data Capture Fields
   ============================================ */
function renderDataCapture(compId, fields, state) {
  var html = '<div class="fill-grid">';
  fields.forEach(function(field) {
    var val = (state.dataCapture && state.dataCapture[field.id]) || '';
    var wideClass = (field.type === 'textarea') ? ' fill-wide' : '';
    html += '<div class="fill-item' + wideClass + '">';
    html += '<label>' + esc(field.label) + '</label>';

    if (field.type === 'toggle' && field.options) {
      html += '<div class="toggle-row">';
      field.options.forEach(function(opt, idx) {
        var activeClass = (val === opt) ? ' active-neutral' : '';
        html += '<button class="toggle-btn' + activeClass + '" onclick="setDataCapture(\'' + compId + '\',\'' + field.id + '\',\'' + esc(opt) + '\',this)">' + esc(opt) + '</button>';
      });
      html += '</div>';
    } else if (field.type === 'select' && field.options) {
      html += '<select onchange="setDataCapture(\'' + compId + '\',\'' + field.id + '\',this.value)">';
      html += '<option value="">Select...</option>';
      field.options.forEach(function(opt) {
        var sel = (val === opt) ? ' selected' : '';
        html += '<option value="' + esc(opt) + '"' + sel + '>' + esc(opt) + '</option>';
      });
      html += '</select>';
    } else if (field.type === 'textarea') {
      html += '<textarea placeholder="' + esc(field.placeholder || '') + '" oninput="setDataCapture(\'' + compId + '\',\'' + field.id + '\',this.value)">' + esc(val) + '</textarea>';
    } else {
      var inputType = field.type === 'number' ? 'number' : 'text';
      html += '<input type="' + inputType + '" placeholder="' + esc(field.placeholder || '') + '" value="' + esc(val) + '" oninput="setDataCapture(\'' + compId + '\',\'' + field.id + '\',this.value)">';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function setDataCapture(compId, fieldId, value, btnEl) {
  var state = getComponentState(compId);
  state.dataCapture[fieldId] = value;
  saveState();
  // If toggle button, update active state
  if (btnEl) {
    btnEl.parentElement.querySelectorAll('.toggle-btn').forEach(function(b) {
      b.classList.remove('active-neutral','active-yes','active-no','active-na');
    });
    btnEl.classList.add('active-neutral');
  }
  updateComponentSummary(compId);
}

/* ============================================
   RENDER: Type Select
   ============================================ */
function renderTypeSelect(compId, typeSelect, state) {
  var html = '';
  html += '<div class="section-label accent">' + esc(typeSelect.question || 'What type?') + '</div>';

  // Type chips
  html += '<div class="chip-group" id="type-chips-' + compId + '">';
  typeSelect.options.forEach(function(opt) {
    var activeClass = (state.selectedType === opt.id) ? ' active' : '';
    html += '<button class="chip' + activeClass + '" onclick="selectTypeOption(\'' + compId + '\',\'' + opt.id + '\',this)">' + esc(opt.label) + '</button>';
  });
  html += '</div>';

  // Not sure? ID helper
  if (typeSelect.idHelper && typeSelect.idHelper.length) {
    html += '<div style="text-align:center;padding:4px">';
    html += '<button class="chip sm" onclick="this.nextElementSibling.classList.toggle(\'hidden\')" style="border-style:dashed;color:var(--muted)">Not sure? How to tell them apart</button>';
    html += '<div class="hidden cond">';
    html += renderIdHelper(compId, typeSelect.idHelper, typeSelect.options);
    html += '</div></div>';
  }

  // Type-specific content panels (one per option)
  typeSelect.options.forEach(function(opt) {
    var vis = (state.selectedType === opt.id) ? '' : ' hidden';
    html += '<div id="type-panel-' + compId + '-' + opt.id + '" class="cond' + vis + '">';
    html += renderTypeOptionContent(compId, opt, state);
    html += '</div>';
  });

  return html;
}

function renderTypeOptionContent(compId, opt, state) {
  var html = '';

  // Type-specific checks
  if (opt.checks && opt.checks.length) {
    html += '<div class="section-label">' + esc(opt.label) + ' Checks</div>';
    html += renderChecks(compId, opt.checks, state, 'type-' + opt.id);
  }

  // IL Note
  if (opt.ilNote) {
    html += '<div class="il-note"><span class="flag">&#127987;&#65039;</span>' + esc(opt.ilNote) + '</div>';
  }

  // Type-specific ICA fields
  if (opt.icaFields && opt.icaFields.length) {
    html += '<div class="section-label">ICA Fields</div>';
    html += renderIcaFields(compId, opt.icaFields, state);
  }

  // Type-specific ref tables
  if (opt.refTables && opt.refTables.length) {
    opt.refTables.forEach(function(rt) { html += renderRefTable(rt); });
  }

  // Type-specific rating
  if (opt.rating) {
    html += renderRating(compId, opt.rating, state);
  }

  // Type-specific findings
  if (opt.findings && opt.findings.length) {
    html += '<div class="section-label">Findings</div>';
    html += renderFindings(compId, opt.findings, state, 'type-' + opt.id);
  }

  return html;
}

function selectTypeOption(compId, typeId, el) {
  var state = getComponentState(compId);
  state.selectedType = typeId;
  saveState();

  // Update chips
  var chipGroup = document.getElementById('type-chips-' + compId);
  if (chipGroup) {
    chipGroup.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
  }
  el.classList.add('active');

  // Show/hide type panels
  var comp = findComponent(compId);
  if (comp && comp.typeSelect) {
    comp.typeSelect.options.forEach(function(opt) {
      var panel = document.getElementById('type-panel-' + compId + '-' + opt.id);
      if (panel) {
        panel.classList.toggle('hidden', opt.id !== typeId);
      }
    });
  }

  updateComponentSummary(compId);
}

/* ============================================
   RENDER: ID Helper
   ============================================ */
function renderIdHelper(compId, helpers, typeOptions) {
  var html = '<div class="id-grid">';
  helpers.forEach(function(h) {
    // Try to find matching type option
    var matchId = '';
    if (typeOptions) {
      typeOptions.forEach(function(opt) {
        if (opt.label.toLowerCase().indexOf(h.name.toLowerCase()) >= 0 ||
            h.name.toLowerCase().indexOf(opt.label.toLowerCase()) >= 0 ||
            opt.label.toLowerCase().replace(/\s/g,'').indexOf(h.name.toLowerCase().replace(/\s/g,'')) >= 0) {
          matchId = opt.id;
        }
      });
    }
    var onclick = matchId ? ' onclick="selectTypeFromHelper(\'' + compId + '\',\'' + matchId + '\')"' : '';
    html += '<div class="id-card"' + onclick + '>';

function selectTypeFromHelper(compId, typeId) {
  var chipGroup = document.getElementById('type-chips-' + compId);
  if (!chipGroup) return;
  var chips = chipGroup.querySelectorAll('.chip');
  var comp = findComponent(compId);
  if (!comp || !comp.typeSelect) return;

function renderChecks(compId, checks, state, prefix) {
